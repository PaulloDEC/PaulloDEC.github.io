<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Viewer</title>
<style>
  /* ── Colour tokens ── */
  :root {
    --backdrop:        #C8C0B0;
    --page-bg:         #FAF6EF;
    --page-blank-bg:   #F0ECE4;
    --page-text:       #1E1B13;
    --page-label:      #999;
    --page-spine:      #999;
    --jump-link:       #BE2E0D;
    --jump-link-hover: #E85530;
    --illus-border:    #bbb;
    --illus-bg:        #EDE9E0;
    --illus-text:      #999;
    --ui-bg:           #F0ECE4;
    --ui-border:       #999;
    --ui-text:         #666;
    --ui-text-hover:   #222;
    --ui-btn-text:     #1E1B13;
    --spread-shadow:   rgba(0,0,0,0.35);
    --toggle-track:    #bbb;
    --toggle-track-on: #888;
    --toggle-knob:     #fff;
    --divider:         #aaa;
    --error-text:      #800;
    --error-link:      #1a4a8a;
  }

  [data-theme="dark"] {
    --backdrop:        #1A1814;
    --page-bg:         #2A2824;
    --page-blank-bg:   #222018;
    --page-text:       #D1CEC7;
    --page-label:      #666;
    --page-spine:      #444;
    --jump-link:       #fff440;
    --jump-link-hover: #fffaa7;
    --illus-border:    #444;
    --illus-bg:        #222018;
    --illus-text:      #666;
    --ui-bg:           #222018;
    --ui-border:       #444;
    --ui-text:         #888;
    --ui-text-hover:   #ccc;
    --ui-btn-text:     #D1CEC7;
    --spread-shadow:   rgba(0,0,0,0.6);
    --toggle-track:    #444;
    --toggle-track-on: #777;
    --toggle-knob:     #ccc;
    --divider:         #555;
    --error-text:      #c66;
    --error-link:      #7a9fcc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-color: #5a462f;
    opacity: 0.05;
    -webkit-mask-image: url('backdrop_texture.svg');
    -webkit-mask-repeat: repeat;
    mask-image: url('backdrop_texture.svg');
    mask-repeat: repeat;
    pointer-events: none;
    z-index: -1;
  }

  body {
    font-family: Georgia, serif;
    background: var(--backdrop);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 12px 20px;
    gap: 12px;
    transition: background 0.3s ease;
  }

  #error-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: var(--error-text);
    font-size: 1em;
    margin-top: 40px;
  }

  #error-area a { color: var(--error-link); }

  #book-container {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    flex: 1;
    width: 100%;
    min-height: 0;
  }

  #spread-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-height: 0;
  }

  #spread-row button {
    width: 44px;
    height: 44px;
    font-size: 1.3em;
    cursor: pointer;
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    border-radius: 4px;
    color: var(--ui-btn-text);
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
  }

  #spread-row button:disabled {
    opacity: 0.35;
    cursor: default;
  }

  #spread-scaler {
    position: relative;
    flex-shrink: 0;
  }

  #spread {
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    transform-origin: top left;
    box-shadow: 0 4px 24px var(--spread-shadow);
    background: linear-gradient(to right, #eee8df 0%, #efe8df 44.46%, #efe8df 44.6%, #efeae0 49.13%, #eee8de 49.93%, #e6ded1 50.02%, #e6ded2 50.35%, #ebe4d9 51.82%, #ece6db 53.09%, #ede6dd 54.55%, #eee8df 100%);
  }

  [data-theme="dark"] #spread {
    background: linear-gradient(to right, #252320 0%, #24221f 49.93%, #22201d 49.98%, #201e1b 50.02%, #242320 100%);
  }

  /* ── Content Fading ── */
  .page-label, .page-content {
    opacity: 1;
    transition: opacity 0.15s ease-in-out;
  }

  .page-turning .page-label, 
  .page-turning .page-content {
    opacity: 0;
  }

  .page {
    width: 218px;
    height: 325px;
    background: transparent;
    padding: 6px 16px 14px 16px;
    font-size: 0.38em;
    line-height: 1.65;
    color: var(--page-text);
    overflow-y: hidden;
    border: none;
    position: relative;
    flex-shrink: 0;
    transition: background 0.3s ease, color 0.3s ease;
    z-index: 0;
  }

  .page.left-page  { border-right: none; }
  .page.right-page { border-left: none; }
  .page.hidden-page { display: none; }
  .page.solo-page  { border-right: none; }
  .page.blank      { background: rgba(0,0,0,0.03); }

  /* FIX: Full bleed for covers */
  .page.cover-page {
    background: #000;
    padding: 0;
  }

  .page.cover-page .page-label {
    display: none;
  }

  .page.cover-page .page-content {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .cover-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .page-label {
    font-size: 0.7em;
    color: var(--page-label);
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .page-content { white-space: normal; }
  .page-content p { margin: 0; white-space: pre-wrap; }
  .page-content .blank-line { display: block; height: 0.6em; }
  .page-content .cent { display: inline-block; width: 100%; text-align: center; }
  .page-content .ind { display: inline-block; margin-left: 2.5em; width: calc(100% - 2.5em); }
  .page-content .big { font-size: 2em; line-height: 1.2; }

  .illus-block {
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px dashed var(--illus-border);
    background: var(--illus-bg);
    color: var(--illus-text);
    font-size: 0.8em;
    font-style: italic;
    text-align: center;
    margin: 8px 0;
    padding: 8px;
    width: 100%;
    position: relative;
  }

  .illus-placeholder-text {
    transition: opacity 0.2s;
  }

  .illus-block.has-image .illus-placeholder-text {
    display: none;
  }

  .illus-block.has-image {
    border: none;
    background: none;
    padding: 0;
    margin: 8px 0;
  }

  .illus-block img {
    opacity: 0;
    transition: opacity 0.3s ease-in-out;
  }

  .illus-block.has-image img {
    opacity: 1;
  }

  .illus-full img { width: 100%; height: auto; max-height: 280px; object-fit: contain; display: block; }
  .illus-mini img { width: 100%; height: auto; max-height: 120px; object-fit: contain; display: block; }
  .illus-full:not(.has-image) { height: 200px; }
  .illus-mini:not(.has-image) { height: 90px; }

  .goto-link {
    color: var(--jump-link);
    cursor: pointer;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.15s;
  }

  .goto-link:hover { color: var(--jump-link-hover); }

  #bottom-bar {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 14px;
    font-size: 0.82em;
    color: var(--ui-text);
    flex-shrink: 0;
  }

  #bottom-bar a, #bottom-bar label {
    color: var(--ui-text);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.15s;
  }

  #bottom-bar a:hover, #bottom-bar label:hover { color: var(--ui-text-hover); }
  .bar-divider { color: var(--divider); user-select: none; }

  #jump-input {
    width: 60px;
    padding: 3px 6px;
    border: 1px solid var(--ui-border);
    background: var(--page-bg);
    color: var(--page-text);
    border-radius: 3px;
    text-align: center;
    font-family: Georgia, serif;
  }

  #btn-jump {
    padding: 3px 10px;
    cursor: pointer;
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    color: var(--ui-btn-text);
    border-radius: 3px;
    font-family: Georgia, serif;
  }

  .toggle-switch { position: relative; width: 28px; height: 15px; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--toggle-track);
    border-radius: 15px;
    cursor: pointer;
  }
  .toggle-switch input:checked + .toggle-track { background: var(--toggle-track-on); }
  .toggle-track::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 11px;
    height: 11px;
    background: var(--toggle-knob);
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle-switch input:checked + .toggle-track::after { transform: translateX(13px); }
</style>
</head>
<body>

<div id="error-area">
  <div id="error-msg">Could not load book.</div>
  <a href="index.html">&larr; Back to book list</a>
</div>

<div id="book-container">
  <div id="spread-row">
    <button id="btn-back" title="Turn page back">&#8592;</button>
    <div id="spread-scaler">
      <div id="spread">
        <div class="page left-page" id="left-page">
          <div class="page-label" id="left-label"></div>
          <div class="page-content" id="left-content"></div>
        </div>
        <div class="page right-page" id="right-page">
          <div class="page-label" id="right-label"></div>
          <div class="page-content" id="right-content"></div>
        </div>
      </div>
    </div>
    <button id="btn-forward" title="Turn page forward">&#8594;</button>
  </div>

  <div id="bottom-bar">
    <a href="index.html">&larr; Books</a>
    <span class="bar-divider">|</span>
    <label for="jump-input">Go to page:</label>
    <input type="text" id="jump-input" placeholder="e.g. 16">
    <button id="btn-jump">Go</button>
    <span class="bar-divider">|</span>
    <label for="theme-toggle">Dark mode</label>
    <label class="toggle-switch">
      <input type="checkbox" id="theme-toggle">
      <div class="toggle-track"></div>
    </label>
  </div>
</div>

<script>
let pages = [];
let spreadIndex = 0;
let currentBook = null;

const PAGE_W = 218;
const PAGE_H = 325;

const GOTO_RE  = /(?:go to page|goto page|turn to page)\s+(\d+)/i;
const ILLUS_RE = /^>>>\s*Illustration\s+(\d+)/i;
const MINI_RE  = /^>>>\s*Mini(?:\s+Illustration)?\s+(\d+)/i;

function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('theme-toggle').checked = dark;
  localStorage.setItem('theme', dark ? 'dark' : 'light');
}

applyTheme(localStorage.getItem('theme') === 'dark');
document.getElementById('theme-toggle').addEventListener('change', e => applyTheme(e.target.checked));

// Keyboard Navigation
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') document.getElementById('btn-back').click();
  if (e.key === 'ArrowRight') document.getElementById('btn-forward').click();
});

async function init() {
  const params = new URLSearchParams(window.location.search);
  const codename = params.get('book');
  if (!codename) return;

  try {
    const r = await fetch('book_list.json?v=' + Date.now());
    const list = await r.json();
    currentBook = list.find(b => b.codename === codename);
    const txtR = await fetch(currentBook.data + '?v=' + Date.now());
    parseBook(await txtR.text());
    
    // START PRELOADING IMMEDIATELY
    preloadBookAssets();

    document.getElementById('book-container').style.display = 'flex';
    renderSpread();
  } catch (e) {
    document.getElementById('error-area').style.display = 'flex';
  }
}

function parseBook(text) {
  pages = [];
  const headerRe = /^---\s*PAGE:\s*(.+?)\s*---/;
  const lines = text.split('\n');
  let current = null;
  for (const line of lines) {
    const m = line.match(headerRe);
    if (m) {
      if (current) pages.push(current);
      current = { id: m[1].trim(), rawText: '' };
    } else if (current) current.rawText += line + '\n';
  }
  if (current) pages.push(current);
}

// ── PRELOADING LOGIC ──────────────────────────────────────
function preloadBookAssets() {
  const imagePaths = new Set();

  // 1. Add Covers
  imagePaths.add(`${currentBook.cover}.${currentBook.coverExt}`);
  imagePaths.add(`${currentBook.back}.${currentBook.coverExt}`);

  // 2. Scan pages for illustrations/minis
  pages.forEach(page => {
    const lines = page.rawText.split('\n');
    lines.forEach(line => {
      const trimmed = line.trim();
      const miniMatch = trimmed.match(MINI_RE);
      const illusMatch = trimmed.match(ILLUS_RE);
      if (miniMatch) imagePaths.add(miniPath(parseInt(miniMatch[1], 10)));
      if (illusMatch) imagePaths.add(illustrationPath(parseInt(illusMatch[1], 10)));
    });
  });

  // 3. Trigger fetch
  imagePaths.forEach(path => {
    const img = new Image();
    img.src = path;
  });
}

function tryLoadIllustration(div, src) {
  const img = document.createElement('img');
  img.onload = () => div.classList.add('has-image');
  img.src = src;
  div.appendChild(img);
}

function parseMarkup(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\[b\]/gi, '<strong>').replace(/\[\/b\]/gi, '</strong>')
    .replace(/\[i\]/gi, '<em>').replace(/\[\/i\]/gi, '</em>')
    .replace(/\[cent\]/gi, '<span class="cent">').replace(/\[\/cent\]/gi, '</span>')
    .replace(/\[ind\]/gi, '<span class="ind">').replace(/\[\/ind\]/gi, '</span>')
    .replace(/\[big\]/gi, '<span class="big">').replace(/\[\/big\]/gi, '</span>');
}

function renderPageContent(pIdx, slotEl, labelEl) {
  const pageEl = slotEl.closest('.page');
  if (pIdx < 0 || pIdx >= pages.length) {
    slotEl.innerHTML = ''; labelEl.textContent = '';
    pageEl.classList.add('blank'); pageEl.classList.remove('cover-page');
    return;
  }
  pageEl.classList.remove('blank');
  const page = pages[pIdx];
  const isCover = page.id === 'COVER' || page.id === 'BACK';

  if (isCover) {
    pageEl.classList.add('cover-page');
    labelEl.textContent = '';
    const src = page.id === 'COVER' ? `${currentBook.cover}.${currentBook.coverExt}` : `${currentBook.back}.${currentBook.coverExt}`;
    slotEl.innerHTML = `<img class="cover-img" src="${src}">`;
    return;
  }

  pageEl.classList.remove('cover-page');
  labelEl.textContent = page.id;
  const lines = page.rawText.split('\n');
  const frag = document.createDocumentFragment();
  for (const line of lines) {
    const trimmed = line.trim();
    const miniMatch = trimmed.match(MINI_RE);
    const illusMatch = trimmed.match(ILLUS_RE);
    if (miniMatch || illusMatch) {
      const type = miniMatch ? 'mini' : 'full';
      const div = document.createElement('div');
      div.className = `illus-block illus-${type}`;
      div.innerHTML = `<span class="illus-placeholder-text">${trimmed.replace('>>> ', '')}</span>`;
      tryLoadIllustration(div, miniMatch ? miniPath(parseInt(miniMatch[1], 10)) : illustrationPath(parseInt(illusMatch[1], 10)));
      frag.appendChild(div);
      continue;
    }
    if (trimmed === '') {
      const s = document.createElement('span'); s.className = 'blank-line'; frag.appendChild(s);
      continue;
    }
    const p = document.createElement('p');
    if (GOTO_RE.test(line)) {
      const a = document.createElement('a'); a.className = 'goto-link'; a.innerHTML = parseMarkup(line);
      a.onclick = () => gotoPage(line.match(GOTO_RE)[1]); p.appendChild(a);
    } else p.innerHTML = parseMarkup(line);
    frag.appendChild(p);
  }
  slotEl.innerHTML = ''; slotEl.appendChild(frag);
}

function renderSpread() {
  renderPageContent(
    leftIdx(spreadIndex),
    document.getElementById('left-content'),
    document.getElementById('left-label')
  );

  renderPageContent(
    rightIdx(spreadIndex),
    document.getElementById('right-content'),
    document.getElementById('right-label')
  );

  const solo = soloPage(spreadIndex);

  const leftPage = document.getElementById('left-page');
  const rightPage = document.getElementById('right-page');

  leftPage.classList.remove('hidden-page', 'solo-page');
  rightPage.classList.remove('hidden-page', 'solo-page');

  if (solo === 'right') {
    leftPage.classList.add('hidden-page');
  } else if (solo === 'left') {
    leftPage.classList.add('solo-page');
    rightPage.classList.add('hidden-page');
  }

  document.getElementById('btn-back').disabled = spreadIndex === 0;
  document.getElementById('btn-forward').disabled = spreadIndex >= totalSpreads() - 1;

  scalePages();
}

function changeSpread(newIdx) {
  const spreadEl = document.getElementById('spread');
  spreadEl.classList.add('page-turning');
  setTimeout(() => {
    spreadIndex = newIdx;
    renderSpread();
    requestAnimationFrame(() => spreadEl.classList.remove('page-turning'));
  }, 150);
}

function leftIdx(s) { return s === 0 ? -1 : s * 2 - 1; }
function rightIdx(s) { return s === 0 ? 0 : s * 2; }
function totalSpreads() { return 1 + Math.ceil((pages.length - 1) / 2); }
function soloPage(s) { const li = leftIdx(s), ri = rightIdx(s); if (ri >= 0 && (pages[ri].id === 'COVER' || pages[ri].id === 'BACK') && li < 0) return 'right'; if (li >= 0 && (pages[li].id === 'COVER' || pages[li].id === 'BACK') && ri >= pages.length) return 'left'; return null; }
function illustrationPath(n) { return `${currentBook.folder}/illustrations/${currentBook.codename}_illustration_${String(n).padStart(2, '0')}.${currentBook.imageExt}`; }
function miniPath(n) { return `${currentBook.folder}/minis/${currentBook.codename}_mini_${String(n).padStart(2, '0')}.${currentBook.imageExt}`; }
function scalePages() {
  const spreadRow = document.getElementById('spread-row');
  const scaler = document.getElementById('spread-scaler');
  const spread = document.getElementById('spread');
  const availH = spreadRow.getBoundingClientRect().height;
  if (availH <= 0) return;
  const scale = availH / PAGE_H;
  const pCount = soloPage(spreadIndex) ? 1 : 2;
  spread.style.transform = `scale(${scale})`;
  scaler.style.width = `${PAGE_W * pCount * scale}px`;
  scaler.style.height = `${PAGE_H * scale}px`;
}
function gotoPage(id) { 
  const idx = pages.findIndex(p => p.id === id || p.id === String(id).padStart(2, '0'));
  if (idx >= 0) changeSpread(idx === 0 ? 0 : (idx % 2 === 1 ? (idx + 1) / 2 : idx / 2));
}

document.getElementById('btn-back').onclick = () => spreadIndex > 0 && changeSpread(spreadIndex - 1);
document.getElementById('btn-forward').onclick = () => spreadIndex < totalSpreads() - 1 && changeSpread(spreadIndex + 1);
document.getElementById('btn-jump').onclick = () => gotoPage(document.getElementById('jump-input').value.trim());
window.onresize = scalePages;
init();
</script>
</body>
</html>
