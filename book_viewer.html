<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Viewer</title>
  <style>
    /* ── Colour tokens ── */
    :root {
      --backdrop:        #C8C0B0;
      --page-bg:         #FAF6EF;
      --page-blank-bg:   #F0ECE4;
      --page-text:       #1E1B13;
      --page-label:      #999;
      --page-spine:      #999;
      --jump-link:       #BE2E0D;
      --jump-link-hover: #E85530;
      --illus-border:    #bbb;
      --illus-bg:        #EDE9E0;
      --illus-text:      #999;
      --ui-bg:           #F0ECE4;
      --ui-border:       #999;
      --ui-text:         #5A462F;
      --ui-text-hover:   #5A462F;
      --ui-btn-text:     #1E1B13;
      --spread-shadow:   rgba(0,0,0,0.35);
      --toggle-track:    #B19F7C;
      --toggle-track-on: #5A462F;
      --toggle-knob:     #fff;
      --divider:         #aaa;
      --error-text:      #800;
      --error-link:      #1a4a8a;
      --prompt-bg:       rgba(0,0,0,0.55);
      --prompt-card-bg:  #FAF6EF;
      --prompt-card-border: #B19F7C;
      --prompt-text:     #1E1B13;
      --prompt-subtext:  #5A462F;
    }

    [data-theme="dark"] {
      --backdrop:        #1A1814;
      --page-bg:         #2A2824;
      --page-blank-bg:   #222018;
      --page-text:       #D1CEC7;
      --page-label:      #666;
      --page-spine:      #444;
      --jump-link:       #fff440;
      --jump-link-hover: #fffaa7;
      --illus-border:    #444;
      --illus-bg:        #222018;
      --illus-text:      #666;
      --ui-bg:           #222018;
      --ui-border:       #444;
      --ui-text:         #B19F7C;
      --ui-text-hover:   #B19F7C;
      --ui-btn-text:     #D1CEC7;
      --spread-shadow:   rgba(0,0,0,0.6);
      --toggle-track:    #332e23;
      --toggle-track-on: #B19F7C;
      --toggle-knob:     #ccc;
      --divider:         #555;
      --error-text:      #c66;
      --error-link:      #7a9fcc;
      --prompt-bg:       rgba(0,0,0,0.75);
      --prompt-card-bg:  #2A2824;
      --prompt-card-border: #5A462F;
      --prompt-text:     #D1CEC7;
      --prompt-subtext:  #B19F7C;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-color: #5a462f;
      opacity: 0.05;
      -webkit-mask-image: url('backdrop_texture.svg');
      mask-image: url('backdrop_texture.svg');
      mask-repeat: repeat;
      pointer-events: none;
      z-index: -1;
    }

    body {
      font-family: Georgia, serif;
      background: var(--backdrop);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 12px 20px;
      gap: 12px;
      transition: background 0.3s ease;
    }

    /* ── Layout Containers ── */
    #error-area {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--error-text);
      font-size: 1em;
      margin-top: 40px;
    }

    #error-area a { color: var(--error-link); }

    #book-container {
      display: none; /* Revealed by script after init/prompt */
      flex-direction: column;
      align-items: center;
      gap: 12px;
      flex: 1;
      width: 100%;
      min-height: 0;
    }

    #spread-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-height: 0;
    }

    #spread-row button {
      width: 44px;
      height: 44px;
      font-size: 1.3em;
      cursor: pointer;
      background: var(--ui-bg);
      border: 1px solid var(--ui-border);
      border-radius: 4px;
      color: var(--ui-btn-text);
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }

    #spread-row button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    #spread-scaler {
      position: relative;
      flex-shrink: 0;
    }

    #spread {
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      transform-origin: top left;
      box-shadow: 0 4px 24px var(--spread-shadow);
      /* Custom gradient creates the 3D 'spine' effect */
      background: linear-gradient(to right, #eee8df 0%, #efe8df 44.46%, #efe8df 44.6%, #efeae0 49.13%, #eee8de 49.93%, #e6ded1 50.02%, #e6ded2 50.35%, #ebe4d9 51.82%, #ece6db 53.09%, #ede6dd 54.55%, #eee8df 100%);
    }

    [data-theme="dark"] #spread {
      background: linear-gradient(to right, #252320 0%, #24221f 49.93%, #22201d 49.98%, #201e1b 50.02%, #242320 100%);
    }

    /* ── Content Fading & Transitions ── */
    .page-label, .page-content { opacity: 1; }

    body.fade-enabled .page-label,
    body.fade-enabled .page-content {
      transition: opacity 0.15s ease-in-out;
    }

    body.fade-enabled .page-turning .page-label,
    body.fade-enabled .page-turning .page-content { opacity: 0; }

    body.fade-enabled .illus-block img { transition: opacity 0.3s ease-in-out; }

    /* ── Page Styles ── */
    .page {
      width: 218px;
      height: 325px;
      background: transparent;
      padding: 6px 16px 14px 16px;
      font-size: 0.38em;
      line-height: 1.65;
      color: var(--page-text);
      overflow-y: hidden;
      border: none;
      position: relative;
      flex-shrink: 0;
      transition: background 0.3s ease, color 0.3s ease;
      z-index: 0;
    }

    .page.hidden-page { display: none; }
    .page.solo-page   { border-right: none; }
    .page.blank       { background: rgba(0,0,0,0.03); }

    .page.cover-page {
      background: #000;
      padding: 0;
    }

    .page.cover-page .page-label { display: none; }
    .page.cover-page .page-content {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .cover-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .page-label {
      font-size: 0.7em;
      color: var(--page-label);
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .page-content { white-space: normal; }
    .page-content p { margin: 0; white-space: pre-wrap; }
    .page-content .blank-line { display: block; height: 0.6em; }
    .page-content .cent { display: inline-block; width: 100%; text-align: center; }
    .page-content .ind { display: inline-block; margin-left: 2.5em; width: calc(100% - 2.5em); }
    .page-content .big { font-size: 2em; line-height: 1.2; }

    /* ── Illustrations ── */
    .illus-block {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px dashed var(--illus-border);
      background: var(--illus-bg);
      color: var(--illus-text);
      font-size: 0.8em;
      font-style: italic;
      text-align: center;
      margin: 8px 0;
      padding: 8px;
      width: 100%;
      position: relative;
    }

    .illus-block.has-image { border: none; background: none; padding: 0; margin: 8px 0; }
    .illus-block.has-image .illus-placeholder-text { display: none; }
    .illus-block img { width: 100%; height: auto; display: block; }
    .illus-full img { max-height: 280px; object-fit: contain; }
    .illus-mini img { max-height: 120px; object-fit: contain; }
    .illus-full:not(.has-image) { height: 200px; }
    .illus-mini:not(.has-image) { height: 90px; }

    .goto-link {
      color: var(--jump-link);
      cursor: pointer;
      text-decoration: none;
      font-weight: bold;
      letter-spacing: -0.03em;
      transition: color 0.15s;
    }
    .goto-link:hover { color: var(--jump-link-hover); }

    /* ── UI Components ── */
    #bottom-bar {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 14px;
      font-size: 0.82em;
      color: var(--ui-text);
      flex-shrink: 0;
      padding: 2px 0;
    }

    #bottom-bar a,
    #bottom-bar label,
    #bottom-bar span.bar-label {
      color: var(--ui-text);
      text-decoration: none;
      font-size: 1em;
      white-space: nowrap;
      cursor: pointer;
      transition: color 0.15s;
    }

    #bottom-bar a:hover,
    #bottom-bar label:hover { color: var(--ui-text-hover); }

    .bar-divider { color: var(--divider); font-size: 0.85em; user-select: none; }

    #jump-input {
      width: 60px;
      padding: 3px 6px;
      font-size: 1em;
      border: 1px solid var(--ui-border);
      background: var(--page-bg);
      color: var(--page-text);
      border-radius: 3px;
      text-align: center;
      font-family: Georgia, serif;
    }

    #btn-jump {
      padding: 3px 10px;
      font-size: 1em;
      cursor: pointer;
      background: var(--ui-bg);
      border: 1px solid var(--ui-border);
      color: var(--ui-btn-text);
      border-radius: 3px;
      font-family: Georgia, serif;
    }

    .toggle-switch {
      position: relative;
      width: 28px;
      height: 15px;
      flex-shrink: 0;
    }

    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--toggle-track);
      border-radius: 15px;
      transition: background 0.2s;
      cursor: pointer;
    }

    .toggle-switch input:checked + .toggle-track { background: var(--toggle-track-on); }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 11px;
      height: 11px;
      background: var(--toggle-knob);
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-switch input:checked + .toggle-track::after { transform: translateX(13px); }

    /* ── Dialog Overlays ── */
    #continue-prompt {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--prompt-bg);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #continue-prompt.visible { display: flex; }

    #continue-card {
      background: var(--prompt-card-bg);
      border: 1px solid var(--prompt-card-border);
      border-radius: 4px;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 320px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    #continue-card .prompt-title {
      font-size: 1em;
      color: var(--prompt-text);
      font-weight: bold;
      letter-spacing: 0.04em;
    }

    #continue-card .prompt-sub {
      font-size: 0.82em;
      color: var(--prompt-subtext);
      line-height: 1.5;
    }

    #continue-card .prompt-buttons {
      display: flex;
      gap: 12px;
      margin-top: 4px;
    }

    #continue-card button {
      padding: 6px 18px;
      font-size: 0.85em;
      cursor: pointer;
      border-radius: 3px;
      font-family: Georgia, serif;
      border: 1px solid var(--prompt-card-border);
      background: var(--ui-bg);
      color: var(--ui-btn-text);
      transition: background 0.15s;
    }

    #continue-card button:hover { background: var(--illus-bg); }

    #continue-card button.primary {
      background: var(--prompt-card-border);
      color: var(--prompt-card-bg);
    }

    #continue-card button.primary:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <div id="error-area">
    <div id="error-msg">Could not load book.</div>
    <a href="index.html">&larr; Back to book list</a>
  </div>

  <div id="continue-prompt">
    <div id="continue-card">
      <div class="prompt-title">Welcome back</div>
      <div class="prompt-sub" id="prompt-sub"></div>
      <div class="prompt-buttons">
        <button id="prompt-start-over">Start over</button>
        <button id="prompt-continue" class="primary">Continue</button>
      </div>
    </div>
  </div>

  <div id="book-container">
    <div id="spread-row">
      <button id="btn-back" title="Turn page back">&#8592;</button>
      <div id="spread-scaler">
        <div id="spread">
          <div class="page left-page" id="left-page">
            <div class="page-label" id="left-label"></div>
            <div class="page-content" id="left-content"></div>
          </div>
          <div class="page right-page" id="right-page">
            <div class="page-label" id="right-label"></div>
            <div class="page-content" id="right-content"></div>
          </div>
        </div>
      </div>
      <button id="btn-forward" title="Turn page forward">&#8594;</button>
    </div>

    <div id="bottom-bar">
      <a href="index.html">&larr; Books</a>
      <span class="bar-divider">|</span>
      <label for="jump-input">Go to page:</label>
      <input type="text" id="jump-input" placeholder="e.g. 16">
      <button id="btn-jump">Go</button>
      <span class="bar-divider">|</span>
      <label for="fade-toggle">Page fade</label>
      <label class="toggle-switch">
        <input type="checkbox" id="fade-toggle">
        <div class="toggle-track"></div>
      </label>
      <span class="bar-divider">|</span>
      <label for="theme-toggle">Dark mode</label>
      <label class="toggle-switch">
        <input type="checkbox" id="theme-toggle">
        <div class="toggle-track"></div>
      </label>
    </div>
  </div>

  <script>
    let pages = [];
    let spreadIndex = 0;
    let currentBook = null;
    let useFade = true;

    // Design dimensions of a single page
    const PAGE_W = 218;
    const PAGE_H = 325;

    // Regex for parsing raw book text markup
    const GOTO_RE  = /(?:go to page|goto page|turn to page)\s+(\d+)/i;
    const ILLUS_RE = /^>>>\s*Illustration\s+(\d+)/i;
    const MINI_RE  = /^>>>\s*Mini(?:\s+Illustration)?\s+(\d+)/i;

    // ── Progress Helpers ──
    function progressKey(codename) { return `book-progress-${codename}`; }

    function saveProgress() {
      if (!currentBook) return;
      const lastSpread = totalSpreads() - 1;
      // Reset progress if at the extreme start or end
      if (spreadIndex === 0 || spreadIndex === lastSpread) {
        localStorage.removeItem(progressKey(currentBook.codename));
      } else {
        localStorage.setItem(progressKey(currentBook.codename), spreadIndex);
      }
    }

    function loadProgress(codename) {
      const saved = localStorage.getItem(progressKey(codename));
      return saved !== null ? parseInt(saved, 10) : null;
    }

    function clearProgress(codename) {
      localStorage.removeItem(progressKey(codename));
    }

    // Creates the text for the "Welcome back" prompt
    function spreadDescription(s) {
      const li = leftIdx(s);
      const ri = rightIdx(s);
      const lPage = li >= 0 && li < pages.length ? pages[li] : null;
      const rPage = ri >= 0 && ri < pages.length ? pages[ri] : null;
      if (lPage && rPage) return `pages ${lPage.id} and ${rPage.id}`;
      if (lPage) return `page ${lPage.id}`;
      if (rPage) return `page ${rPage.id}`;
      return 'your last position';
    }

    // ── Settings Management ──
    function applyTheme(dark) {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      document.getElementById('theme-toggle').checked = dark;
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    }

    function applyFade(enabled) {
      useFade = enabled;
      document.body.classList.toggle('fade-enabled', enabled);
      document.getElementById('fade-toggle').checked = enabled;
      localStorage.setItem('book-fade', enabled);
    }

    applyTheme(localStorage.getItem('theme') === 'dark');
    const savedFade = localStorage.getItem('book-fade');
    applyFade(savedFade === null ? true : savedFade === 'true');

    document.getElementById('theme-toggle').addEventListener('change', e => applyTheme(e.target.checked));
    document.getElementById('fade-toggle').addEventListener('change', e => applyFade(e.target.checked));

    window.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowLeft') document.getElementById('btn-back').click();
      if (e.key === 'ArrowRight') document.getElementById('btn-forward').click();
    });

    // ── Data Handling & Parsing ──
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const codename = params.get('book');
      if (!codename) return;

      try {
        const r = await fetch('book_list.json?v=' + Date.now());
        const list = await r.json();
        currentBook = list.find(b => b.codename === codename);
        
        const txtR = await fetch(currentBook.data + '?v=' + Date.now());
        parseBook(await txtR.text());

        preloadBookAssets();

        const savedSpread = loadProgress(codename);
        // Show prompt only if there is valid progress beyond the cover
        if (savedSpread !== null && savedSpread > 0 && savedSpread < totalSpreads()) {
          const desc = spreadDescription(savedSpread);
          document.getElementById('prompt-sub').textContent =
            `You were reading ${currentBook.title}.\nWould you like to continue from ${desc}?`;
          document.getElementById('continue-prompt').classList.add('visible');

          document.getElementById('prompt-continue').onclick = () => {
            document.getElementById('continue-prompt').classList.remove('visible');
            document.getElementById('book-container').style.display = 'flex';
            spreadIndex = savedSpread;
            renderSpread();
          };

          document.getElementById('prompt-start-over').onclick = () => {
            document.getElementById('continue-prompt').classList.remove('visible');
            document.getElementById('book-container').style.display = 'flex';
            clearProgress(codename);
            spreadIndex = 0;
            renderSpread();
          };
        } else {
          document.getElementById('book-container').style.display = 'flex';
          spreadIndex = 0;
          renderSpread();
        }
      } catch (e) {
        document.getElementById('error-area').style.display = 'flex';
      }
    }

    function parseBook(text) {
	  pages = [];
	  // This updated regex handles optional spaces and varying dash counts
	  const headerRe = /^--+\s*PAGE:\s*(.+?)\s*--+/;
	  const lines = text.split('\n');
	  let current = null;
	  
	  for (const line of lines) {
		const m = line.match(headerRe);
		if (m) {
		  if (current) pages.push(current);
		  current = { id: m[1].trim(), rawText: '' };
		} else if (current) {
		  current.rawText += line + '\n';
		}
	  }
	  if (current) pages.push(current);
	}

    // Forces browser to cache images before the user reaches the pages
    function preloadBookAssets() {
      const imagePaths = new Set();
      imagePaths.add(`${currentBook.cover}.${currentBook.coverExt}`);
      imagePaths.add(`${currentBook.back}.${currentBook.coverExt}`);
      pages.forEach(page => {
        page.rawText.split('\n').forEach(line => {
          const trimmed = line.trim();
          const miniMatch = trimmed.match(MINI_RE);
          const illusMatch = trimmed.match(ILLUS_RE);
          if (miniMatch) imagePaths.add(miniPath(parseInt(miniMatch[1], 10)));
          if (illusMatch) imagePaths.add(illustrationPath(parseInt(illusMatch[1], 10)));
        });
      });
      imagePaths.forEach(path => { const img = new Image(); img.src = path; });
    }

    function tryLoadIllustration(div, src) {
      const img = document.createElement('img');
      img.onload = () => div.classList.add('has-image');
      img.src = src;
      div.appendChild(img);
    }

    function parseMarkup(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\[b\]/gi, '<strong>').replace(/\[\/b\]/gi, '</strong>')
        .replace(/\[i\]/gi, '<em>').replace(/\[\/i\]/gi, '</em>')
        .replace(/\[cent\]/gi, '<span class="cent">').replace(/\[\/cent\]/gi, '</span>')
        .replace(/\[ind\]/gi, '<span class="ind">').replace(/\[\/ind\]/gi, '</span>')
        .replace(/\[big\]/gi, '<span class="big">').replace(/\[\/big\]/gi, '</span>');
    }

    // ── Rendering Engine ──
    function renderPageContent(pIdx, slotEl, labelEl) {
      const pageEl = slotEl.closest('.page');
      if (pIdx < 0 || pIdx >= pages.length) {
        slotEl.innerHTML = ''; labelEl.textContent = '';
        pageEl.classList.add('blank'); pageEl.classList.remove('cover-page');
        return;
      }
      pageEl.classList.remove('blank');
      const page = pages[pIdx];
      const isCover = page.id === 'COVER' || page.id === 'BACK';

      if (isCover) {
        pageEl.classList.add('cover-page');
        labelEl.textContent = '';
        const src = page.id === 'COVER'
          ? `${currentBook.cover}.${currentBook.coverExt}`
          : `${currentBook.back}.${currentBook.coverExt}`;
        slotEl.innerHTML = `<img class="cover-img" src="${src}">`;
        return;
      }

      pageEl.classList.remove('cover-page');
      labelEl.textContent = page.id;
      const lines = page.rawText.split('\n');
      const frag = document.createDocumentFragment();
      for (const line of lines) {
        const trimmed = line.trim();
        const miniMatch = trimmed.match(MINI_RE);
        const illusMatch = trimmed.match(ILLUS_RE);
        if (miniMatch || illusMatch) {
          const type = miniMatch ? 'mini' : 'full';
          const div = document.createElement('div');
          div.className = `illus-block illus-${type}`;
          div.innerHTML = `<span class="illus-placeholder-text">${trimmed.replace('>>> ', '')}</span>`;
          tryLoadIllustration(div, miniMatch
            ? miniPath(parseInt(miniMatch[1], 10))
            : illustrationPath(parseInt(illusMatch[1], 10)));
          frag.appendChild(div);
          continue;
        }
        if (trimmed === '') {
          const s = document.createElement('span'); s.className = 'blank-line'; frag.appendChild(s);
          continue;
        }
        const p = document.createElement('p');
        if (GOTO_RE.test(line)) {
          const a = document.createElement('a');
          a.className = 'goto-link';
          a.innerHTML = parseMarkup(line);
          a.onclick = () => gotoPage(line.match(GOTO_RE)[1]);
          p.appendChild(a);
        } else {
          p.innerHTML = parseMarkup(line);
        }
        frag.appendChild(p);
      }
      slotEl.innerHTML = ''; slotEl.appendChild(frag);
    }

    function renderSpread() {
      renderPageContent(leftIdx(spreadIndex),  document.getElementById('left-content'),  document.getElementById('left-label'));
      renderPageContent(rightIdx(spreadIndex), document.getElementById('right-content'), document.getElementById('right-label'));

      const solo = soloPage(spreadIndex);
      const leftPage  = document.getElementById('left-page');
      const rightPage = document.getElementById('right-page');
      leftPage.classList.remove('hidden-page', 'solo-page');
      rightPage.classList.remove('hidden-page', 'solo-page');
      
      if (solo === 'right') {
        leftPage.classList.add('hidden-page');
      } else if (solo === 'left') { 
        leftPage.classList.add('solo-page'); 
        rightPage.classList.add('hidden-page'); 
      }

      document.getElementById('btn-back').disabled    = spreadIndex === 0;
      document.getElementById('btn-forward').disabled = spreadIndex >= totalSpreads() - 1;
      scalePages();
    }

    function changeSpread(newIdx) {
      const spreadEl = document.getElementById('spread');
      const doChange = () => {
        spreadIndex = newIdx;
        renderSpread();
        saveProgress(); 
      };

      if (!useFade) {
        doChange();
        return;
      }

      spreadEl.classList.add('page-turning');
      setTimeout(() => {
        doChange();
        requestAnimationFrame(() => spreadEl.classList.remove('page-turning'));
      }, 150);
    }

    // ── Layout Logic ──
    // Spread 0 = Cover only (right side)
    // Spread 1+ = Left/Right pages
    function leftIdx(s)  { return s === 0 ? -1 : s * 2 - 1; }
    function rightIdx(s) { return s === 0 ? 0  : s * 2; }
    function totalSpreads() { return pages.length === 0 ? 0 : 1 + Math.ceil((pages.length - 1) / 2); }

    function soloPage(s) {
      const li = leftIdx(s), ri = rightIdx(s);
      const lOk = li >= 0 && li < pages.length;
      const rOk = ri >= 0 && ri < pages.length;
      if (rOk && (pages[ri].id === 'COVER' || pages[ri].id === 'BACK') && !lOk) return 'right';
      if (lOk && (pages[li].id === 'COVER' || pages[li].id === 'BACK') && !rOk) return 'left';
      return null;
    }

    function illustrationPath(n) {
      return `${currentBook.folder}/illustrations/${currentBook.codename}_illustration_${String(n).padStart(2,'0')}.${currentBook.imageExt}`;
    }
    function miniPath(n) {
      return `${currentBook.folder}/minis/${currentBook.codename}_mini_${String(n).padStart(2,'0')}.${currentBook.imageExt}`;
    }

    // Dynamically scales the book to fit the available vertical height
    function scalePages() {
      const spreadRow = document.getElementById('spread-row');
      const scaler    = document.getElementById('spread-scaler');
      const spread    = document.getElementById('spread');
      const availH    = spreadRow.getBoundingClientRect().height;
      if (availH <= 0) return;
      const scale  = availH / PAGE_H;
      const pCount = soloPage(spreadIndex) ? 1 : 2;
      spread.style.transform = `scale(${scale})`;
      scaler.style.width  = `${PAGE_W * pCount * scale}px`;
      scaler.style.height = `${PAGE_H * scale}px`;
    }

    function gotoPage(id) {
      const idx = pages.findIndex(p => p.id === id || p.id === String(id).padStart(2, '0'));
      if (idx >= 0) changeSpread(idx === 0 ? 0 : (idx % 2 === 1 ? (idx + 1) / 2 : idx / 2));
    }

    // ── Navigation Listeners ──
    document.getElementById('btn-back').onclick    = () => spreadIndex > 0 && changeSpread(spreadIndex - 1);
    document.getElementById('btn-forward').onclick = () => spreadIndex < totalSpreads() - 1 && changeSpread(spreadIndex + 1);
    document.getElementById('btn-jump').onclick    = () => gotoPage(document.getElementById('jump-input').value.trim());
    document.getElementById('jump-input').addEventListener('keydown', e => { 
      if (e.key === 'Enter') gotoPage(document.getElementById('jump-input').value.trim()); 
    });
    
    // Using addEventListener for better compatibility and to prevent overwriting other scripts
    window.addEventListener('resize', scalePages);

    init();
  </script>
</body>
</html>
