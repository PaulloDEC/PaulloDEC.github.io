<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zork Books 3D - Final Refinement</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }

        #ui-layer {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #333;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: color 0.3s;
        }

        .toggle-container:hover { color: #666; }
        input[type="checkbox"] { cursor: pointer; accent-color: #222; }
    </style>
</head>
<body>

<div id="ui-layer">
    <label class="toggle-container">
        <span>Clean</span>
        <input type="checkbox" id="condition-toggle">
        <span>Worn</span>
    </label>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

    const booksData = [
        { id: 'krill', file: 'krill', color: 0x399CCE },
        { id: 'malifestro', file: 'malifestro', color: 0xDC5C36 },
        { id: 'cavern', file: 'cavern', color: 0xAACA33 },
        { id: 'conquest', file: 'conquest', color: 0xF4DB27 }
    ];

    let scene, camera, renderer, raycaster, mouse;
    const books = [];
    let currentHoveredId = null;
    let isWorn = false;

    function createGlowTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
        gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
        gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.6)');
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 64, 64);
        return new THREE.CanvasTexture(canvas);
    }

    const glowTexture = createGlowTexture();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 10;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        // 20% Brighter Lighting (0.8 -> 0.96 Ambient)
        scene.add(new THREE.AmbientLight(0xffffff, 2.5));
        const light = new THREE.PointLight(0xffffff, 60);
        light.position.set(0, 5, 10);
        scene.add(light);

        const loader = new OBJLoader();
        const texLoader = new THREE.TextureLoader();

        booksData.forEach((data, index) => {
            const cleanTex = texLoader.load(`./splash/${data.file}_clean.jpg`);
            const wornTex = texLoader.load(`./splash/${data.file}_worn.jpg`);
            [cleanTex, wornTex].forEach(t => t.colorSpace = THREE.SRGBColorSpace);

            loader.load('book_mesh.obj', (obj) => {
                const group = new THREE.Group();
                const mesh = obj.children[0];
                mesh.material = new THREE.MeshStandardMaterial({ map: cleanTex });
                
                group.scale.setScalar(0.9);
                group.position.x = (index - 1.5) * 3.2;

                // Glow Sprite - Pushed further back to Z: -2.5
                const spriteMat = new THREE.SpriteMaterial({ 
                    map: glowTexture, color: data.color, transparent: true, 
                    opacity: 0.1, blending: THREE.AdditiveBlending 
                });
                const glow = new THREE.Sprite(spriteMat);
                glow.position.z = -0.5; 
                glow.scale.set(3, 4.5, 1);
                
                group.add(obj);
                group.add(glow);

                group.userData = { 
                    id: data.id, clean: cleanTex, worn: wornTex, glow: glow,
                    targetScale: 0.9,
                    targetRotation: new THREE.Euler(0, 0, 0),
                    targetGlowOpacity: 0.1,
                    targetGlowScale: new THREE.Vector3(3, 4.5, 1)
                };

                scene.add(group);
                books.push(group);
            });
        });

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('click', onClick);
        window.addEventListener('resize', onWindowResize);
        document.getElementById('condition-toggle').addEventListener('change', (e) => {
            isWorn = e.target.checked;
            updateTextures();
        });
    }

    function updateTextures() {
        books.forEach(b => {
            const mesh = b.children[0].children[0];
            mesh.material.map = isWorn ? b.userData.worn : b.userData.clean;
            mesh.material.needsUpdate = true;
        });
    }

    function onMouseMove(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(books, true);

        if (intersects.length > 0) {
            let target = intersects[0].object;
            while(target.parent && !target.userData.id) { target = target.parent; }
            
            // Tightened vertical hit-area check
            const localPoint = target.worldToLocal(intersects[0].point.clone());
            if (Math.abs(localPoint.y) < 2.1) {
                currentHoveredId = target.userData.id;
                target.userData.targetRotation.y = -localPoint.x * 0.2;
                target.userData.targetRotation.x = localPoint.y * 0.1; // 50% less dramatic
                target.userData.targetScale = 1.0;
                target.userData.targetGlowOpacity = 0.75;
                target.userData.targetGlowScale.set(6, 8, 1);
                return;
            }
        }
        currentHoveredId = null;
    }

    function onClick() {
        const book = books.find(b => b.userData.id === currentHoveredId);
        if (book) {
            window.location.href = `book_viewer.html?book=${encodeURIComponent(book.userData.id)}`;
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);

        books.forEach(book => {
            if (book.userData.id !== currentHoveredId) {
                book.userData.targetScale = 0.9;
                book.userData.targetRotation.set(0, 0, 0);
                book.userData.targetGlowOpacity = 0.25; // Retain subtle 10% brightness
                book.userData.targetGlowScale.set(3, 4.5, 1);
            }

            book.scale.lerp(new THREE.Vector3().setScalar(book.userData.targetScale), 0.1);
            book.rotation.x = THREE.MathUtils.lerp(book.rotation.x, book.userData.targetRotation.x, 0.1);
            book.rotation.y = THREE.MathUtils.lerp(book.rotation.y, book.userData.targetRotation.y, 0.1);
            
            const glow = book.userData.glow;
            glow.material.opacity = THREE.MathUtils.lerp(glow.material.opacity, book.userData.targetGlowOpacity, 0.1);
            glow.scale.lerp(book.userData.targetGlowScale, 0.05);
        });

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
